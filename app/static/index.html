<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Validator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 40px 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    p.subtitle { color: #666; margin-bottom: 32px; }
    textarea { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; resize: vertical; min-height: 80px; }
    button { margin-top: 12px; padding: 12px 32px; background: #000; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:disabled { background: #999; cursor: not-allowed; }
    .section { background: #fff; border-radius: 8px; padding: 24px; margin-top: 24px; border: 1px solid #eee; }
    .section h2 { font-size: 18px; margin-bottom: 16px; }
    .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .score-card { background: #f9f9f9; border-radius: 8px; padding: 16px; text-align: center; }
    .score-card .value { font-size: 32px; font-weight: bold; }
    .score-card .label { font-size: 13px; color: #666; margin-top: 4px; }
    .verdict { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    .summary { color: #444; line-height: 1.6; }
    ul { list-style: none; padding: 0; }
    ul li { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    ul li a { color: #0066cc; text-decoration: none; }
    ul li a:hover { text-decoration: underline; }
    .loading { text-align: center; color: #666; padding: 40px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Idea Validator Agent</h1>
    <p class="subtitle">Enter your startup idea and the agent will research competitors, pain points, and score it.</p>

    <textarea id="idea" placeholder="e.g. AI tutor for competitive exams"></textarea>
    <button id="submit-btn" onclick="validate()">Validate My Idea</button>

    <div id="loading" class="loading hidden">
      Researching your idea... this takes ~30 seconds
    </div>

    <div id="results" class="hidden">

      <div class="section">
        <h2>Scorecard</h2>
        <div class="score-grid">
          <div class="score-card">
            <div class="value" id="market-score"></div>
            <div class="label">Market Score</div>
          </div>
          <div class="score-card">
            <div class="value" id="competition-score"></div>
            <div class="label">Competition Score</div>
          </div>
          <div class="score-card">
            <div class="value" id="pain-score"></div>
            <div class="label">Pain Score</div>
          </div>
          <div class="score-card">
            <div class="value" id="overall-score"></div>
            <div class="label">Overall Score</div>
          </div>
        </div>
        <div style="margin-top: 20px;">
          <div class="verdict" id="verdict"></div>
          <div class="summary" id="summary"></div>
        </div>
      </div>

      <div class="section">
        <h2>Competitors Found</h2>
        <ul id="competitors-list"></ul>
      </div>

      <div class="section">
        <h2>Pain Points & Demand</h2>
        <ul id="pain-list"></ul>
      </div>

    </div>
  </div>

  <script>
    async function validate() {
      const idea = document.getElementById("idea").value.trim();
      if (!idea) return;

      document.getElementById("submit-btn").disabled = true;
      document.getElementById("loading").classList.remove("hidden");
      document.getElementById("results").classList.add("hidden");

      const response = await fetch("/validate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ idea })
      });

      const data = await response.json();
      const s = data.scorecard;

      document.getElementById("market-score").textContent = s.market_score + "/10";
      document.getElementById("competition-score").textContent = s.competition_score + "/10";
      document.getElementById("pain-score").textContent = s.pain_score + "/10";
      document.getElementById("overall-score").textContent = s.overall_score + "/10";
      document.getElementById("verdict").textContent = s.verdict;
      document.getElementById("summary").textContent = s.one_line_summary;

      const compList = document.getElementById("competitors-list");
      compList.innerHTML = "";
      data.competitors.forEach(c => {
        const parts = c.replace("- ", "").split(": http");
        const li = document.createElement("li");
        if (parts.length > 1) {
          li.innerHTML = `<a href="http${parts[1]}" target="_blank">${parts[0]}</a>`;
        } else {
          li.textContent = c;
        }
        compList.appendChild(li);
      });

      const painList = document.getElementById("pain-list");
      painList.innerHTML = "";
      data.pain_points.forEach(p => {
        const parts = p.replace("- ", "").split(": http");
        const li = document.createElement("li");
        if (parts.length > 1) {
          li.innerHTML = `<a href="http${parts[1]}" target="_blank">${parts[0]}</a>`;
        } else {
          li.textContent = p;
        }
        painList.appendChild(li);
      });

      document.getElementById("loading").classList.add("hidden");
      document.getElementById("results").classList.remove("hidden");
      document.getElementById("submit-btn").disabled = false;
    }
  </script>
</body>
</html>
